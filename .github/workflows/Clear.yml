name: Clear Clash Directory

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clear-clash:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clear rule/Clash directory
        run: |
          TARGET_DIR="rule/Clash"

          if [ -d "$TARGET_DIR" ]; then
            echo "Clearing $TARGET_DIR ..."
            find "$TARGET_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          else
            echo "$TARGET_DIR does not exist, creating it..."
            mkdir -p "$TARGET_DIR"
          fi

          # 保留空目录，否则 Git 不会追踪空文件夹
          touch "$TARGET_DIR/.gitkeep"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add rule/Clash

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Clear rule/Clash directory"
            git push
          fi