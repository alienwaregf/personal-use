name: Auto Convert Rules to MRS
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git clone --depth 1 https://github.com/blackmatrix7/ios_rule_script.git source_repo
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - run: pip install pyyaml
      - run: |
          MIHOMO_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep "browser_download_url.*linux-amd64-compatible" | cut -d '"' -f 4 | head -n 1)
          wget -O mihomo.gz $MIHOMO_URL && gunzip mihomo.gz && chmod +x mihomo && sudo mv mihomo /usr/local/bin/mihomo
      - run: python Scripts/convert_rules.py
      - run: rm -rf source_repo
      - run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add rule/Clash/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update and sync rules" && git push)
