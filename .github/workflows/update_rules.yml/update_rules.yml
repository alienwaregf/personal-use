name: Auto Convert Rules to MRS

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时运行一次 (UTC时间)
  workflow_dispatch: # 允许你手动点击运行测试

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        
      - name: 拉取 Blackmatrix7 仓库
        run: |
          git clone --depth 1 https://github.com/blackmatrix7/ios_rule_script.git source_repo
          
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 安装 Python 依赖
        run: pip install pyyaml
        
      - name: 下载并安装 Mihomo 内核
        run: |
          MIHOMO_URL=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep "browser_download_url.*linux-amd64-compatible" | cut -d '"' -f 4 | head -n 1)
          wget -O mihomo.gz $MIHOMO_URL
          gunzip mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo
          
      - name: 运行转换脚本
        # 核心修改点：已将路径更正为你仓库实际的大写 Scripts 目录
        run: python Scripts/convert_rules.py
        
      - name: 清理临时文件
        run: rm -rf source_repo
        
      - name: 提交并推送到 GitHub
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add rule/Clash/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update and convert mrs rules" && git push)